<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI辅助评价</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #f0f0f0;
    }
    
    .icon {
      width: 32px;
      height: 32px;
      background: #1890ff;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 16px;
    }
    
    .title {
      font-size: 16px;
      font-weight: 600;
      color: #333;
    }
    
    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    
    .status-label {
      font-size: 14px;
      color: #666;
    }
    
    .toggle-switch {
      position: relative;
      width: 44px;
      height: 22px;
    }
    
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: 0.3s;
      border-radius: 22px;
    }
    
    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 2px;
      bottom: 2px;
      background-color: white;
      transition: 0.3s;
      border-radius: 50%;
    }
    
    input:checked + .toggle-slider {
      background-color: #1890ff;
    }
    
    input:checked + .toggle-slider:before {
      transform: translateX(22px);
    }
    
    .info-section {
      background: #f6ffed;
      border: 1px solid #b7eb8f;
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 16px;
    }
    
    .info-title {
      font-size: 13px;
      font-weight: 600;
      color: #52c41a;
      margin-bottom: 6px;
    }
    
    .info-text {
      font-size: 12px;
      color: #666;
      line-height: 1.5;
    }
    
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-primary {
      background: #1890ff;
      color: white;
    }
    
    .btn-primary:hover {
      background: #40a9ff;
    }
    
    .footer {
      margin-top: 12px;
      text-align: center;
      font-size: 12px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="icon">AI</div>
    <div class="title">AI辅助评价</div>
  </div>
  
  <div class="status-row">
    <span class="status-label">扩展状态</span>
    <label class="toggle-switch">
      <input type="checkbox" id="enabledToggle">
      <span class="toggle-slider"></span>
    </label>
  </div>
  
  <div class="info-section">
    <div class="info-title">使用说明</div>
    <div class="info-text">
      在 www.qidi-edu.com 的输入框中点击，即可使用AI辅助评价功能。
    </div>
  </div>
  
  <button class="btn btn-primary" id="optionsBtn">打开设置页面</button>
  
  <div class="footer">适用于 www.qidi-edu.com</div>
  
  <script src="popup.js"></script>
</body>
</html>
